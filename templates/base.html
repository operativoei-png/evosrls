<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or 'Evolve Cloud' }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% if current_user.is_authenticated %}
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('dashboard') }}">
      {{ app_settings.company_name if app_settings else 'Evolve' }}
   <a class="nav-link" href="{{ url_for('tools') }}">Attrezzature</a>
<a class="nav-link" href="{{ url_for('vans') }}">Furgoni</a>
<a class="nav-link" href="{{ url_for('charges') }}">Addebiti</a> 
    </a>
    <div>
      <a class="btn btn-light btn-sm" href="{{ url_for('dashboard') }}">Dashboard</a>
      <a class="btn btn-light btn-sm" href="{{ url_for('technicians') }}">Tecnici</a>
      <a class="btn btn-light btn-sm" href="{{ url_for('warehouse') }}">Magazzino</a>
      <a class="btn btn-light btn-sm" href="{{ url_for('transfers') }}">Bolle</a>
      <a class="btn btn-light btn-sm" href="{{ url_for('settings') }}">Impostazioni</a>
      <a class="btn btn-danger btn-sm" href="{{ url_for('logout') }}">Esci</a>
    </div>
  </div>
</nav>
{% endif %}

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
